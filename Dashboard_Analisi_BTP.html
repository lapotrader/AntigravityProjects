
    <!DOCTYPE html>
    <html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard Analisi BTP</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #0a0a1a;
                --card-bg: #16213e;
                --accent-color: #00d4ff;
                --text-color: #e8e8e8;
                --green: #00e676;
                --red: #ff5252;
                --border-radius: 12px;
            }
            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .header {
                width: 100%;
                max-width: 1200px;
                text-align: left;
                margin-bottom: 30px;
                border-bottom: 2px solid var(--card-bg);
                padding-bottom: 10px;
            }
            .header h1 { margin: 0; color: var(--accent-color); font-size: 2.5em; }
            .header p { color: #8892a8; margin: 5px 0 0 0; }
            
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                width: 100%;
                max-width: 1200px;
                margin-bottom: 30px;
            }
            .card {
                background: var(--card-bg);
                padding: 20px;
                border-radius: var(--border-radius);
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                border: 1px solid rgba(255,255,255,0.05);
                text-align: center;
                transition: transform 0.3s ease;
            }
            .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
            .card h3 { margin: 0; font-size: 0.9em; color: #8892a8; text-transform: uppercase; }
            .card .value { font-size: 1.8em; font-weight: 700; margin-top: 10px; }
            .card .positive { color: var(--green); }
            .card .negative { color: var(--red); }
            
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                width: 100%;
                max-width: 1200px;
            }
            .chart-container {
                background: var(--card-bg);
                padding: 15px;
                border-radius: var(--border-radius);
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                grid-column: span 2;
            }
            .chart-half { grid-column: span 1; }
            
            @media (max-width: 900px) {
                .charts-grid { grid-template-columns: 1fr; }
                .chart-half { grid-column: span 2; }
            }
        </style>
    </head>

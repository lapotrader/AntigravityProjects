const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.parentElement.clientWidth - 20;
const H = 520;
canvas.width = W;
canvas.height = H;

const PAD = { top: 30, bottom: 45, left: 70, right: 20 };
const CW = (W - PAD.left - PAD.right) / DATA.length;

const prices = DATA.flatMap(d => [d.h, d.l]);
const maxP = Math.max(...prices);
const minP = Math.min(...prices);
const range = maxP - minP || 1;
const padR = range * 0.08;
const hi = maxP + padR;
const lo = minP - padR;

function yp(p) { return PAD.top + (hi - p) / (hi - lo) * (H - PAD.top - PAD.bottom); }
function xp(i) { return PAD.left + i * CW + CW / 2; }

// grid
ctx.strokeStyle = '#16162a';
ctx.lineWidth = 0.5;
for (let i = 0; i <= 10; i++) {
  const y = PAD.top + i * (H - PAD.top - PAD.bottom) / 10;
  ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
  const val = (hi - (hi - lo) * i / 10).toFixed(0);
  ctx.fillStyle = '#4a4a6a';
  ctx.font = '11px Consolas';
  ctx.textAlign = 'right';
  ctx.fillText(val, PAD.left - 8, y + 4);
}

// volume bars
const maxV = Math.max(...DATA.map(d => d.v));
DATA.forEach((d, i) => {
  const x = PAD.left + i * CW;
  const vh = (d.v / maxV) * 80;
  ctx.fillStyle = '#1a1a30';
  ctx.fillRect(x + 1, H - PAD.bottom - vh, CW - 2, vh);
});

// candlesticks
DATA.forEach((d, i) => {
  const x = PAD.left + i * CW;
  const cx = x + CW / 2;
  const isGreen = d.c >= d.o;
  ctx.strokeStyle = isGreen ? '#00c853' : '#ff1744';
  ctx.fillStyle = isGreen ? '#00c853' : '#ff1744';
  // wick
  ctx.beginPath();
  ctx.moveTo(cx, yp(d.h));
  ctx.lineTo(cx, yp(d.l));
  ctx.stroke();
  // body
  const top = yp(Math.max(d.o, d.c));
  const bot = yp(Math.min(d.o, d.c));
  const bw = Math.max(CW * 0.6, 2);
  if (isGreen) {
    ctx.fillRect(cx - bw / 2, top, bw, Math.max(bot - top, 1));
  } else {
    ctx.strokeRect(cx - bw / 2, top, bw, Math.max(bot - top, 1));
    ctx.fillRect(cx - bw / 2, top, bw, Math.max(bot - top, 1));
  }
});

// x-axis labels (every 10 bars)
const labelGap = Math.max(1, Math.floor(DATA.length / 10));
for (let i = 0; i < DATA.length; i += labelGap) {
  const t = new Date(DATA[i].dt);
  const lbl = t.getHours().toString().padStart(2, '0') + ':' + t.getMinutes().toString().padStart(2, '0');
  ctx.fillStyle = '#4a4a6a';
  ctx.font = '10px Consolas';
  ctx.textAlign = 'center';
  ctx.fillText(lbl, xp(i), H - PAD.bottom + 20);
}

// last close
const last = DATA[DATA.length - 1];
const lastC = last.c;
const lastG = last.c >= last.o;
ctx.fillStyle = lastG ? '#00c853' : '#ff1744';
ctx.font = 'bold 24px Consolas';
ctx.textAlign = 'right';
ctx.fillText(lastC.toFixed(1), W - PAD.right, PAD.top + 20);

const chg = ((lastC - DATA[0].o) / DATA[0].o * 100).toFixed(2);
ctx.font = '13px Consolas';
ctx.fillStyle = chg >= 0 ? '#00c853' : '#ff1744';
ctx.fillText((chg >= 0 ? '+' : '') + chg + '%', W - PAD.right, PAD.top + 38);

// legend
const leg = document.getElementById('legend');
const o = last.o.toFixed(1), h = last.h.toFixed(1), l = last.l.toFixed(1), c = last.c.toFixed(1), v = last.v;
leg.innerHTML = `

  <span>O: <span class="val">${o}</span></span>
  <span>H: <span class="val red">${h}</span></span>
  <span>L: <span class="val green">${l}</span></span>
  <span>C: <span class="val ${lastG ? 'green' : 'red'}">${c}</span></span>
  <span>Vol: <span class="val">${v.toLocaleString()}</span></span>
  <span>Barre: <span class="val">${DATA.length}</span></span>
`;

document.getElementById('lastDate').textContent = DATA[DATA.length-1].dt.slice(0,10) + ' ' + DATA[DATA.length-1].dt.slice(11,16);

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#eee;padding:20px}
h1{font-size:1.4rem;margin-bottom:12px;color:#4af}
nav{margin-bottom:16px;display:flex;flex-wrap:wrap;gap:6px}
nav button{background:#222;color:#ccc;border:1px solid #333;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:.85rem}
nav button:hover{background:#333;color:#fff}
nav button.active{background:#4af;color:#000;border-color:#4af}
#path-bar{margin-bottom:12px;font-size:.85rem;color:#888;word-break:break-all}
#path-bar a{color:#4af;cursor:pointer;text-decoration:none}
#path-bar a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:6px 10px;text-align:left;border-bottom:1px solid #222}
th{color:#888;font-weight:500;position:sticky;top:0;background:#111}
tr{cursor:pointer}
tr:hover{background:#1a1a2e}
.dir{color:#4af}
.file{color:#ccc}
.size{text-align:right;color:#666;font-variant-numeric:tabular-nums}
.date{color:#555;font-variant-numeric:tabular-nums}
.rename-btn{background:0;border:none;color:#ea0;cursor:pointer;padding:2px 6px;font-size:.8rem;border-radius:3px}
.rename-btn:hover{background:#332800}
#rename-dialog{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
#rename-dialog.show{display:flex}
.dialog-box{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:24px;min-width:340px;max-width:90vw}
.dialog-box h3{margin-bottom:12px;color:#ea0}
.dialog-box label{display:block;margin:8px 0 4px;color:#888;font-size:.8rem}
.dialog-box input{width:100%;padding:8px;background:#111;border:1px solid #333;border-radius:4px;color:#eee;font-size:.9rem}
.dialog-box input:focus{outline:none;border-color:#4af}
.dialog-actions{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}
.dialog-actions button{padding:8px 18px;border-radius:4px;border:none;cursor:pointer;font-size:.85rem}
.dialog-actions .btn-cancel{background:#333;color:#ccc}
.dialog-actions .btn-confirm{background:#ea0;color:#000;font-weight:600}
.dialog-actions .btn-confirm:hover{background:#ffc107}
.status{position:fixed;bottom:20px;right:20px;background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:8px 14px;font-size:.8rem;color:#4af;display:none}
.status.show{display:block}
.loading{text-align:center;padding:40px;color:#555}
</style>
</head>
<body>

<h1>&#x1F4C1; FileShare</h1>
<nav id="roots-nav"></nav>
<div id="path-bar"></div>
<div id="listing"><div class="loading">Seleziona una cartella sopra</div></div>

<div id="rename-dialog">
  <div class="dialog-box">
    <h3>Rinomina file</h3>
    <label>Nome originale</label>
    <input id="rename-old" readonly>
    <label>Nuovo nome</label>
    <input id="rename-new" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeRename()">Annulla</button>
      <button class="btn-confirm" onclick="doRename()">Rinomina</button>
    </div>
  </div>
</div>

<div id="status" class="status"></div>

<script>
const ROOTS = [];
let currentDir = "";
let renameTarget = "";

async function api(url, opts={}) {
  const r = await fetch(url, opts);
  return r.json();
}

async function loadRoots() {
  const data = await api("/api/roots");
  const nav = document.getElementById("roots-nav");
  nav.innerHTML = "";
  data.forEach((r, i) => {
    const btn = document.createElement("button");
    btn.textContent = r.label;
    btn.onclick = () => browse(r.path);
    btn.dataset.path = r.path;
    if (i === 0) btn.classList.add("active");
    nav.appendChild(btn);
  });
  if (data.length > 0) browse(data[0].path);
}

function showStatus(msg, ok=true) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = ok ? "#4af" : "#f44";
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

async function browse(dir) {
  currentDir = dir;
  // update nav active
  document.querySelectorAll("#roots-nav button").forEach(b => {
    b.classList.toggle("active", dir.startsWith(b.dataset.path));
  });
  const el = document.getElementById("listing");
  el.innerHTML = '<div class="loading">Caricamento...</div>';
  const data = await api(`/api/ls?dir=${encodeURIComponent(dir)}`);
  if (data.error) {
    el.innerHTML = `<div style="color:#f44;padding:20px">Errore: ${data.error}</div>`;
    return;
  }
  renderListing(data);
}

function renderListing(data) {
  const el = document.getElementById("listing");
  // path bar
  const bar = document.getElementById("path-bar");
  const parts = data.current.split(/[\\\/]/).filter(Boolean);
  let accum = "";
  let html = "";
  for (const p of parts) {
    accum += (accum ? "\\" : "") + p;
    html += `<a onclick="browse('${accum}')">${p}</a>\\`;
  }
  // remove trailing backslash
  html = html.replace(/\\$/, "");
  if (data.parent) {
    html = `<a onclick="browse('${data.parent}')">..</a>\\` + html;
  }
  bar.innerHTML = html;

  if (!data.items || data.items.length === 0) {
    el.innerHTML = '<div style="padding:20px;color:#555">Cartella vuota</div>';
    return;
  }

  let tbl = `<table><thead><tr><th>Nome</th><th>Dimensione</th><th>Data</th><th></th></tr></thead><tbody>`;
  for (const item of data.items) {
    const isDir = item.is_dir;
    const name = item.name;
    const fullPath = data.current + "\\" + name;
    const size = isDir ? "—" : fmtSize(item.size);
    const date = fmtDate(item.mtime);
    const cls = isDir ? "dir" : "file";
    const click = isDir ? `onclick="browse('${fullPath}')"` : "";
    const rbtn = isDir ? "" : `<button class="rename-btn" onclick="event.stopPropagation();openRename('${fullPath.replace(/\\/g,'\\\\')}','${name}')">✎</button>`;
    tbl += `<tr class="${cls}" ${click}><td>${icon(isDir)} ${name}</td><td class="size">${size}</td><td class="date">${date}</td><td>${rbtn}</td></tr>`;
  }
  tbl += "</tbody></table>";
  el.innerHTML = tbl;
}

function icon(isDir) { return isDir ? "📁" : "📄"; }
function fmtSize(b) {
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(1) + " KB";
  return (b/1024/1024).toFixed(1) + " MB";
}
function fmtDate(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleDateString("it-IT", {day:"2-digit",month:"2-digit",year:"2-digit"}) + " " +
         d.toLocaleTimeString("it-IT", {hour:"2-digit",minute:"2-digit"});
}

function openRename(full, name) {
  renameTarget = full;
  document.getElementById("rename-old").value = name;
  document.getElementById("rename-new").value = name;
  document.getElementById("rename-dialog").classList.add("show");
  setTimeout(() => document.getElementById("rename-new").focus(), 100);
  document.getElementById("rename-new").select();
}

function closeRename() {
  document.getElementById("rename-dialog").classList.remove("show");
  renameTarget = "";
}

async function doRename() {
  const newName = document.getElementById("rename-new").value.trim();
  if (!newName) return;
  if (newName === document.getElementById("rename-old").value) { closeRename(); return; }
  const r = await api("/api/rename", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({old: renameTarget, new: newName}),
  });
  closeRename();
  if (r.error) {
    showStatus("Errore: " + r.error, false);
  } else {
    showStatus("Rinominato: " + r.old.split("\\").pop() + " → " + r.new.split("\\").pop());
    browse(currentDir);
  }
}

// keyboard: Enter to confirm rename, Escape to cancel
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeRename();
  if (e.key === "Enter" && document.getElementById("rename-dialog").classList.contains("show")) doRename();
});

loadRoots();
</script>
</body>
</html>
